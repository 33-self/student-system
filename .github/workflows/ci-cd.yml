name: Student System CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: school_management   # 确保与你的 application.properties 中的数据库名一致
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/school_management/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build backend with Maven (skip tests)
        run: |
          cd backend/school_management
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Start Spring Boot backend in background
        run: |
          cd backend/school_management
          nohup ./mvnw spring-boot:run > spring.log 2>&1 &
          echo "Waiting 60 seconds for backend to start..."
          sleep 60

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('test-api/school_management_test/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip

      - name: Install Python dependencies
        run: |
          cd test-api/school_management_test
          pip install -r requirements.txt

      - name: Initialize database schema (if needed)
        # 如果你的项目有 schema.sql 文件，取消下面行的注释并调整路径
        # run: |
        #   mysql -h 127.0.0.1 -u root -proot school_management < backend/school_management/src/main/resources/schema.sql
        run: echo "Skipping schema initialization (no schema.sql found)"
        # 如果你希望用 Spring Boot 自动建表，可以跳过这一步
      
      - name: Print backend log if startup failed
        if: failure()
        run: cat backend/school_management/spring.log
        
      - name: Run API tests with Pytest
        run: |
          cd test-api/school_management_test
          pytest --alluredir=allure-results
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: school_management

      - name: Upload Allure results (API)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api-results
          path: test-api/school_management_test/allure-results

  # 部署任务（可选，如果你不需要自动部署到服务器，可以删除整个 deploy 任务）
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/student-system
            git pull origin main
            cd backend/school_management
            ./mvnw clean package -DskipTests
            sudo systemctl restart student-system
