<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理 - 学校管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-logout {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .toolbar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-add {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .btn-edit, .btn-delete {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 13px;
        }
        .btn-edit {
            background: #ffc107;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            color: #333;
        }
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>学生管理系统</h1>
        <div class="user-info">
            <span id="welcomeText"></span>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <button class="btn-add" onclick="showAddModal()">+ 添加学生</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>班级</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="studentTable">
            </tbody>
        </table>
    </div>

    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加学生</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="message" class="message"></div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="1">男</option>
                        <option value="2">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>年龄</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" id="className" required>
                </div>
                <button type="submit" class="btn-submit">保存</button>
            </form>
        </div>
    </div>

    <script>
        let currentEditId = null;

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const username = localStorage.getItem('username');
            const role = localStorage.getItem('role');
            document.getElementById('welcomeText').textContent = `欢迎，${username}（${role === 1 ? '管理员' : '老师'}）`;

            loadStudents();
        };

        async function loadStudents() {
            try {
                const response = await fetch('/api/students', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                if (response.ok) {
                    const students = await response.json();
                    displayStudents(students);
                } else {
                    alert('加载失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        function displayStudents(students) {
            const tbody = document.getElementById('studentTable');
            tbody.innerHTML = '';

            students.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.gender === 1 ? '男' : '女'}</td>
                    <td>${student.age}</td>
                    <td>${student.className}</td>
                    <td>
                        <button class="btn-edit" onclick="showEditModal(${student.id})">编辑</button>
                        <button class="btn-delete" onclick="deleteStudent(${student.id})">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = '添加学生';
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
            document.getElementById('studentModal').style.display = 'flex';
        }

        async function showEditModal(id) {
            currentEditId = id;
            document.getElementById('modalTitle').textContent = '编辑学生';

            try {
                const response = await fetch(`/api/students/${id}`, {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                if (response.ok) {
                    const student = await response.json();
                    document.getElementById('studentId').value = student.id;
                    document.getElementById('name').value = student.name;
                    document.getElementById('gender').value = student.gender;
                    document.getElementById('age').value = student.age;
                    document.getElementById('className').value = student.className;
                    document.getElementById('studentModal').style.display = 'flex';
                }
            } catch (error) {
                alert('加载失败');
            }
        }

        function closeModal() {
            document.getElementById('studentModal').style.display = 'none';
        }

        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentData = {
                name: document.getElementById('name').value,
                gender: parseInt(document.getElementById('gender').value),
                age: parseInt(document.getElementById('age').value),
                className: document.getElementById('className').value
            };

            try {
                let response;
                if (currentEditId) {
                    response = await fetch(`/api/students/${currentEditId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('token')
                        },
                        body: JSON.stringify(studentData)
                    });
                } else {
                    response = await fetch('/api/students', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('token')
                        },
                        body: JSON.stringify(studentData)
                    });
                }

                if (response.ok) {
                    showMessage(currentEditId ? '修改成功' : '添加成功', 'success');
                    setTimeout(() => {
                        closeModal();
                        loadStudents();
                    }, 1000);
                } else {
                    const data = await response.json();
                    showMessage(data.error || '操作失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误', 'error');
            }
        });

        async function deleteStudent(id) {
            if (!confirm('确定要删除这个学生吗？')) return;

            try {
                const response = await fetch(`/api/students/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                if (response.ok) {
                    alert('删除成功');
                    loadStudents();
                } else {
                    const data = await response.json();
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
